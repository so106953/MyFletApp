name: Flet Windows 全自动打包 (.exe)

on:
  push:
    tags:
      - 'win-v*'  # 必须打如 win-v1.0.0 这样的标签才会触发

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: 'utf-8'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet rich pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      # 新增：如果检测到根目录有 app.ico，自动将其拷贝到 assets 目录参与打包编译
      - name: 配置软件图标
        shell: powershell
        run: |
          if (Test-Path app.ico) {
            New-Item -ItemType Directory -Force -Path assets
            Copy-Item -Path app.ico -Destination assets/icon.ico -Force
            Write-Host "图标已就绪，准备打包..."
          } else {
            Write-Host "未检测到 app.ico，将使用默认图标。"
          }

      # 修改：加入 --icon 参数，强制将图标赋予生成的 exe 文件
      - name: 编译 Windows 软件 (已绑定图标)
        shell: cmd
        run: |
          flet pack main.py --icon app.ico

      - name: 压缩打包文件
        shell: powershell
        run: |
          Compress-Archive -Path dist/* -DestinationPath Flet-App-Windows.zip

      - name: 上传到 Release 页面
        uses: softprops/action-gh-release@v2
        with:
          files: Flet-App-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
