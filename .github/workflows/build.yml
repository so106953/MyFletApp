name: Flet 跨平台全自动打包 (Windows + Android)

on:
  push:
    tags:
      - 'v*'

jobs:
  # ================= 任务 1：打包 Windows (.exe) =================
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: 'utf-8'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet rich
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: 编译 Windows 软件 (.exe)
        shell: cmd
        run: |
          echo y | flet build windows

      # 修正：直接将打包生成的整个 output 目录打包，确保 exe 及其依赖文件被完整压缩
      - name: 压缩打包文件
        shell: powershell
        run: |
          Compress-Archive -Path build/windows/build/exe.win* -DestinationPath Flet-App-Windows.zip -ErrorAction SilentlyContinue
          if (-not (Test-Path Flet-App-Windows.zip)) { Compress-Archive -Path build/windows/* -DestinationPath Flet-App-Windows.zip }

      - name: 上传到 Release 页面
        uses: softprops/action-gh-release@v2
        with:
          files: Flet-App-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ================= 任务 2：打包安卓 (.apk) =================
  build-android:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17 (安卓打包必备环境)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet rich
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 编译安卓 APK
        run: |
          echo "y" | flet build apk
          
      # 修正：将通配符范围扩大，精准匹配 Flet 在 ubuntu 虚拟机中生成的不同架构 apk 路径
      - name: 上传 APK 到 Release 页面
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            output/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
