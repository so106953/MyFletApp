name: Flet 跨平台全自动打包 (Windows + Android)

on:
  push:
    tags:
      - 'v*' # 只要你发布新版本标签（如 v1.0.0），就会触发打包

jobs:
  # ================= 任务 1：打包 Windows (.exe) =================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet rich
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: 编译 Windows 软件 (.exe)
        run: |
          flet build windows --no-rich

      - name: 压缩打包文件
        run: |
          Compress-Archive -Path build/windows/* -DestinationPath Flet-App-Windows.zip

      - name: 上传到 Release 页面
        uses: softprops/action-gh-release@v2
        with:
          files: Flet-App-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ================= 任务 2：打包安卓 (.apk) =================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17 (安卓打包必备环境)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install flet rich
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 编译安卓 APK
        run: |
          flet build apk --no-rich

      - name: 上传 APK 到 Release 页面
        uses: softprops/action-gh-release@v2
        with:
          files: build/apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}